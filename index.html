 <!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCEM</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    background: #0c0c0c;
    background-image: url("https://img.cdn1.vip/i/69d2b3a238af0_1775416226.webp");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    color: rgba(255,255,255,0.8);
    padding-bottom: 100px;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 30px;
    background: rgba(17, 17, 17, 0.4);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky;
    top: 0;
    z-index: 99;
  }

  .logo {
    font-size: 22px;
    font-weight: bold;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
  }

  .nav-links {
    display: flex;
    gap: 20px;
  }

  .nav-links a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 15px;
    white-space: nowrap;
  }

  .nav-links a:hover {
    color: #0cf;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .section {
    margin-bottom: 60px;
    text-align: center;
    padding-top: 80px;
    margin-top: -80px;
    position: relative;
    z-index: 1;
  }

  .section h2 {
    font-size: 28px;
    margin-bottom: 20px;
    color: rgba(255,255,255,0.85);
  }

  .section p {
    color: rgba(255,255,255,0.7);
    margin-bottom: 30px;
    line-height: 1.6;
  }

  .btn {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 6px;
    font-weight: bold;
    text-decoration: none;
    margin: 8px;
    transition: 0.3s;
    cursor: pointer;
    font-size: 15px;
    background: rgba(255, 255, 255, 0.05);
    border: none;
    color: rgba(255,255,255,0.85);
  }

  .btn:hover {
    background: rgba(255, 255, 255, 0.12);
    color: rgba(255,255,255,0.95);
  }

  .card {
    background: rgba(21, 21, 21, 0.5);
    border-radius: 10px;
    padding: 30px;
    margin: 20px 0;
    backdrop-filter: blur(6px);
    position: relative;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 10px;
    border: 2px solid #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.6);
    animation: breathe 3s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes breathe {
    0%   { opacity: 0.07; }
    100% { opacity: 0.7; }
  }

  #home .card {
    background: rgba(17, 26, 61, 0.5);
    padding: 45px 30px;
  }

  #home h2 {
    font-size: 36px;
    color: rgba(255,255,255,0.85);
  }

  #home p {
    font-size: 20px;
    color: rgba(255,255,255,0.7);
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  /* 弹窗样式 */
  .modal {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .modal-content {
    background: rgba(21,21,21,0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    width: 90%;
    max-width: 380px;
    padding: 30px;
    text-align: center;
    color: #fff;
  }
  .modal-content h3 {
    margin-bottom: 15px;
    font-size: 20px;
  }
  .modal-content p {
    margin-bottom: 25px;
    color: rgba(255,255,255,0.8);
  }
  .close-btn {
    padding: 10px 25px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .count-text {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
  }
  .hidden {
    display: none;
  }
</style>
</head>
<body>

<!-- 弹窗 -->

  <div class="modal-content">

    <button class="close-btn" onclick="closeModal()">关闭公告</button>
    <div class="count-text" id="countText">10 秒后自动关闭公告</div>
  </div>
</div>

<nav>

    <a href="#group">交流群</a>
  </div>
</nav>

</div>

<script>
  let sec = 10;
  let timer;
  const modal = document.getElementById('tipModal');
  const countText = document.getElementById('countText');

  function closeModal() {
    modal.classList.add('hidden');
    clearInterval(timer);
  }

  timer = setInterval(() => {
    sec--;
    countText.innerText = sec + ' 秒后自动关闭公告';
    if (sec <= 0) {
      closeModal();
    }
  }, 1000);
</script>

</body>
</html>
