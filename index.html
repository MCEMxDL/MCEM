<!DOCTYPE html>

<meta charset="UTF-8">

<title>MCEM</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    background: #0c0c0c;
    background-image: url("https://img.cdn1.vip/i/69d2b3a238af0_1775416226.webp");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    color: rgba(255,255,255,0.6);
  }

  .streamer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #0cf, transparent);
    animation: streamer 3s linear infinite;
  }

  @keyframes streamer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 30px;
    background: rgba(17, 17, 17, 0.4);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky;
    top: 0;
    z-index: 99;
  }

  .logo {
    font-size: 22px;
    font-weight: bold;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
  }

  .nav-links a {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-size: 15px;
  }

  .nav-links a:hover {
    color: #0cf;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .section {
    margin-bottom: 60px;
    text-align: center;
    padding-top: 80px;
    margin-top: -80px;
    position: relative;
    z-index: 1;
  }

  .section h2 {
    font-size: 28px;
    margin-bottom: 20px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 0 6px rgba(0,0,0,0.3);
  }

  .section p {
    color: rgba(255,255,255,0.5);
    margin-bottom: 30px;
    line-height: 1.6;
    text-shadow: 0 0 4px rgba(0,0,0,0.3);
  }

  /* 按钮：文字透明度 0.85，淡底色，悬浮更亮 */
  .btn {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 6px;
    font-weight: bold;
    text-decoration: none;
    margin: 8px;
    transition: 0.3s;
    cursor: pointer;
    font-size: 15px;
    background: rgba(255, 255, 255, 0.05);
    border: none;
    color: rgba(255,255,255,0.85);
  }

  .btn:hover {
    background: rgba(255, 255, 255, 0.12);
    color: rgba(255,255,255,0.95);
  }

  /* 所有卡片统一流光边框 */
  .card {
    background: rgba(21, 21, 21, 0.5);
    border: 1px solid rgba(0, 204, 255, 0.2);
    border-radius: 10px;
    padding: 30px;
    margin: 20px 0;
    backdrop-filter: blur(6px);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0, 204, 255, 0.15);
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #0cf, transparent);
    animation: streamer 3s linear infinite;
  }

  #home .card {
    background: rgba(17, 26, 61, 0.5);
    border: 1px solid rgba(0, 204, 255, 0.3);
    box-shadow: 0 0 30px rgba(0, 204, 255, 0.2);
    padding: 45px 30px;
  }

  #home h2 {
    font-size: 36px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 0 10px rgba(0,204,255,0.4);
  }

  #home p {
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
